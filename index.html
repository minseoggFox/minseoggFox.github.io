<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loader</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2c3e50, #000000);
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        .spinner {
            position: relative;
            width: 60px;
            height: 60px;
            margin: 0 auto 40px;
        }

        .spinner div {
            position: absolute;
            width: 4px;
            height: 20px;
            background: #3498db;
            border-radius: 10px;
            box-shadow: 0 0 10px #3498db;
            left: 50%;
            top: 50%;
            transform-origin: 50% 0%;
            animation: spinner-glow 1.2s infinite ease-in-out;
        }

        .spinner div:nth-child(1) { --delay: 0.1; transform: translate(-50%, -100%) rotate(36deg); }
        .spinner div:nth-child(2) { --delay: 0.2; transform: translate(-50%, -100%) rotate(72deg); }
        .spinner div:nth-child(3) { --delay: 0.3; transform: translate(-50%, -100%) rotate(108deg); }
        .spinner div:nth-child(4) { --delay: 0.4; transform: translate(-50%, -100%) rotate(144deg); }
        .spinner div:nth-child(5) { --delay: 0.5; transform: translate(-50%, -100%) rotate(180deg); }
        .spinner div:nth-child(6) { --delay: 0.6; transform: translate(-50%, -100%) rotate(216deg); }
        .spinner div:nth-child(7) { --delay: 0.7; transform: translate(-50%, -100%) rotate(252deg); }
        .spinner div:nth-child(8) { --delay: 0.8; transform: translate(-50%, -100%) rotate(288deg); }
        .spinner div:nth-child(9) { --delay: 0.9; transform: translate(-50%, -100%) rotate(324deg); }
        .spinner div:nth-child(10) { --delay: 1.0; transform: translate(-50%, -100%) rotate(360deg); }

        @keyframes spinner-glow {
            0%, 100% {
                background: #3498db;
                box-shadow: 0 0 5px #3498db;
                opacity: 0.3;
            }
            50% {
                background: #f1c40f;
                box-shadow: 0 0 20px #f1c40f;
                opacity: 1;
                height: 25px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .text-content h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 800;
            background: linear-gradient(45deg, #3498db, #f1c40f, #e74c3c, #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-text 5s ease infinite;
        }

        @keyframes gradient-text {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .text-content p {
            font-size: 1.2rem;
            color: #bdc3c7;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner">
            <div style="animation-delay: calc(0.1s * 1)"></div>
            <div style="animation-delay: calc(0.1s * 2)"></div>
            <div style="animation-delay: calc(0.1s * 3)"></div>
            <div style="animation-delay: calc(0.1s * 4)"></div>
            <div style="animation-delay: calc(0.1s * 5)"></div>
            <div style="animation-delay: calc(0.1s * 6)"></div>
            <div style="animation-delay: calc(0.1s * 7)"></div>
            <div style="animation-delay: calc(0.1s * 8)"></div>
            <div style="animation-delay: calc(0.1s * 9)"></div>
            <div style="animation-delay: calc(0.1s * 10)"></div>
        </div>
        <div class="text-content">
            <h1>magbFoxx</h1>
            <p>아직 개발 중이에요...</p>
        </div>
    </div>
</body>
</html>
